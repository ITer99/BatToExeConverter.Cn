name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Verify build and generation
        shell: pwsh
        run: .\scripts\verify.ps1

      - name: Upload converter artifact
        uses: actions/upload-artifact@v4
        with:
          name: BatToExeConverter.Cn-windows-x64
          path: src/BatToExeConverter.Cn/bin/Release/net9.0-windows/
          if-no-files-found: error
