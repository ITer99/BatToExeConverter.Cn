name: Bug report
description: 报告可复现的转换、托盘或运行问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 请先删除日志、路径和脚本中的敏感信息。
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: 例如 main@abcdef0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows 与 .NET 环境
      placeholder: Windows 11 x64, .NET SDK 9.0.x
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请提供最小 BAT/CMD、生成选项和操作步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为与日志
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认脚本和日志不包含密码、令牌或其他敏感信息。
          required: true
        - label: 我已搜索现有 Issue，没有发现相同问题。
          required: true
